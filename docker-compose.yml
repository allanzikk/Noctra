services:
  api:
    build: .
    env_file:
    - .env
    
    restart: unless-stopped
    ports:
    - "8000:8000"

    depends_on:
    - db

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: noctra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: